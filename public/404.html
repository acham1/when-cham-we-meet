<!doctype html>
<html>
  <head>
    <script>
      // Redirect all 404s to index.html for client-side routing on GitHub Pages
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        window.location.origin + '/when-cham-we-meet/' +
        '?p=' + encodeURIComponent(path.replace('/when-cham-we-meet/', '')) +
        (search ? '&q=' + encodeURIComponent(search) : '') +
        (hash ? '&h=' + encodeURIComponent(hash) : '')
      );
    </script>
  </head>
</html>
